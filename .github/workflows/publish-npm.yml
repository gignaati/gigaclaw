name: Publish to npm

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on every version tag push (e.g. v1.2.4, v1.3.0-beta.1).
#
# Pipeline:
#   0. regression-tests  — run full test suite; blocks ALL downstream jobs on failure
#   1. publish-staging   — publish to npm under a temporary "staging" dist-tag
#   2. build-containers  — build & push 4 Docker images in parallel
#   3. promote           — promote staging → real channel (latest / beta / rc)
#   4. release-notes     — generate structured release notes via Node.js script
#   5. github-release    — create GitHub Release with the generated notes
#   6. update-changelog  — commit updated CHANGELOG.md back to main
#   7. cleanup-on-failure — unpublish & remove staging tag if Docker builds fail
#
# Dependency graph:
#
#   regression-tests
#        │
#        ▼
#   publish-staging ──► build-containers ──► promote ──► release-notes ──► github-release ──► update-changelog
#                              │
#                        cleanup-on-failure (runs only if build-containers fails)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:

  # ─── Job 0: Regression test suite (gates the entire pipeline) ────────────
  #
  # Runs scripts/test-tty-regression.mjs — 12 tests covering:
  #   • install.sh TTY re-attachment guards (exec < /dev/tty + conditional)
  #   • setup.mjs Node.js-level TTY guard
  #   • Syntax validation for all three setup files
  #   • /dev/tty accessibility on the runner
  #   • @clack/prompts import
  #   • Simulated curl|bash non-TTY stdin
  #   • install.sh executable bit
  #   • AUTH_SECRET uses base64url (no +/= chars)
  #   • All execSync calls use shell:true
  #   • Homebrew/nvm/asdf PATH sourcing block present
  #
  # Exit code 1 from the script causes this job to fail, which prevents
  # publish-staging (and all downstream jobs) from running.
  # ─────────────────────────────────────────────────────────────────────────
  regression-tests:
    name: Regression Tests (pre-publish gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run regression test suite
        run: node scripts/test-tty-regression.mjs

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-failure-${{ github.ref_name }}
          path: |
            scripts/test-tty-regression.mjs
            install.sh
            setup/setup.mjs
            setup/setup-cloud.mjs
            setup/setup-local.mjs
          retention-days: 14

  # ─── Job 1: Publish to npm under a temporary "staging" tag ───────────────
  publish-staging:
    name: Publish to npm (staging)
    needs: [regression-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      is-prerelease: ${{ steps.meta.outputs.is-prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build compiled assets (JSX → JS)
        run: npm run build

      - name: Detect version and release channel
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CHANNEL=$(node -p "
            const v = require('./package.json').version;
            const pre = v.split('-')[1];
            pre ? pre.replace(/[^a-zA-Z].*/g, '') || 'pre' : 'latest'
          ")
          IS_PRE=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL"      >> $GITHUB_OUTPUT
          echo "is-prerelease=$IS_PRE" >> $GITHUB_OUTPUT
          echo "Publishing $VERSION to staging (final tag: $CHANNEL, prerelease: $IS_PRE)"

      - name: Publish to staging tag
        run: npm publish --tag staging
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Job 2: Build & push Docker images (4 parallel) ──────────────────────
  build-containers:
    name: Build Docker images
    needs: [publish-staging]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: pi-coding-agent-job
            context: templates/docker/pi-coding-agent-job
            dockerfile: templates/docker/pi-coding-agent-job/Dockerfile
          - image: claude-code-job
            context: templates/docker/claude-code-job
            dockerfile: templates/docker/claude-code-job/Dockerfile
          - image: claude-code-workspace
            context: templates/docker/claude-code-workspace
            dockerfile: templates/docker/claude-code-workspace/Dockerfile
          - image: event-handler
            context: .
            dockerfile: templates/docker/event-handler/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: gignaati/gigaclaw:${{ matrix.image }}-${{ needs.publish-staging.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ─── Job 3: Promote npm staging → real channel tag ───────────────────────
  promote:
    name: Promote npm tag
    needs: [publish-staging, build-containers]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Promote staging to ${{ needs.publish-staging.outputs.channel }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.publish-staging.outputs.version }}"
          CHANNEL="${{ needs.publish-staging.outputs.channel }}"
          echo "Promoting gigaclaw@$VERSION to $CHANNEL"
          npm dist-tag add "gigaclaw@$VERSION" "$CHANNEL"
          npm dist-tag rm gigaclaw staging

  # ─── Job 4: Generate structured release notes ────────────────────────────
  #
  # All logic lives in scripts/generate-release-notes.mjs to keep this YAML
  # clean and the generation logic locally testable.
  #
  # Environment variables forwarded to the script:
  #   TO_TAG              — current version tag (e.g. v1.2.4)
  #   OUTPUT_FILE         — path where the script writes release_notes.md
  #   ANTHROPIC_API_KEY   — optional; enables LLM narrative summary
  #   ANTHROPIC_BASE_URL  — Anthropic API base (defaults to api.anthropic.com)
  #   MODEL               — Anthropic model ID
  release-notes:
    name: Generate release notes
    needs: [publish-staging, promote]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate release notes
        env:
          TO_TAG: v${{ needs.publish-staging.outputs.version }}
          OUTPUT_FILE: /tmp/release_notes.md
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          MODEL: ${{ vars.ANTHROPIC_SMALL_FAST_MODEL || vars.ANTHROPIC_MODEL }}
        run: node scripts/generate-release-notes.mjs

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ needs.publish-staging.outputs.version }}
          path: /tmp/release_notes.md
          retention-days: 7

  # ─── Job 5: Create GitHub Release ────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [publish-staging, promote, release-notes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes-${{ needs.publish-staging.outputs.version }}
          path: /tmp

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.publish-staging.outputs.version }}"
          PRERELEASE_FLAG=""
          if [ "${{ needs.publish-staging.outputs.is-prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            $PRERELEASE_FLAG \
            --repo "${{ github.repository }}" \
            --title "GigaClaw $TAG" \
            --notes-file /tmp/release_notes.md
          echo "GitHub Release: https://github.com/${{ github.repository }}/releases/tag/$TAG"

  # ─── Job 6: Update CHANGELOG.md and commit back to main ──────────────────
  #
  # Prepends the generated release notes to CHANGELOG.md.
  # Stable releases commit directly to main; pre-releases open a PR.
  update-changelog:
    name: Update CHANGELOG.md
    needs: [publish-staging, promote, release-notes, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes-${{ needs.publish-staging.outputs.version }}
          path: /tmp

      - name: Prepend release notes to CHANGELOG.md
        env:
          VERSION: ${{ needs.publish-staging.outputs.version }}
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          {
            echo "# Changelog"
            echo ""
            echo "## v${VERSION} — ${RELEASE_DATE}"
            echo ""
            tail -n +2 /tmp/release_notes.md
            echo ""
            echo "---"
            echo ""
            tail -n +2 CHANGELOG.md
          } > /tmp/CHANGELOG_new.md
          mv /tmp/CHANGELOG_new.md CHANGELOG.md
          echo "CHANGELOG.md updated for v${VERSION}"

      - name: Commit changelog update
        env:
          VERSION: ${{ needs.publish-staging.outputs.version }}
          IS_PRE: ${{ needs.publish-staging.outputs.is-prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "gigaclaw-release-bot"
          git config user.email "gigaclaw@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          if [ "$IS_PRE" = "true" ]; then
            BRANCH="changelog/v${VERSION}"
            git checkout -b "$BRANCH"
            git commit -m "docs: update CHANGELOG.md for v${VERSION} [skip ci]"
            git push origin "$BRANCH"
            gh pr create \
              --title "docs: update CHANGELOG.md for v${VERSION}" \
              --body "Automated CHANGELOG update from the release workflow." \
              --base main \
              --head "$BRANCH" \
              --label "documentation" || true
            echo "PR opened for changelog/v${VERSION}"
          else
            git commit -m "docs: update CHANGELOG.md for v${VERSION} [skip ci]"
            git push origin main
            echo "CHANGELOG.md committed to main"
          fi

  # ─── Job 7: Clean up if Docker builds fail ───────────────────────────────
  cleanup-on-failure:
    name: Cleanup on Docker failure
    needs: [publish-staging, build-containers]
    if: always() && needs.publish-staging.result == 'success' && needs.build-containers.result != 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Remove staging tag and unpublish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.publish-staging.outputs.version }}"
          echo "Docker builds failed — cleaning up gigaclaw@$VERSION"
          npm dist-tag rm gigaclaw staging || true
          npm unpublish "gigaclaw@$VERSION" || true
